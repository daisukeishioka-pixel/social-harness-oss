name = "social-harness-workers"
main = "src/index.ts"
compatibility_date = "2025-03-27"

[triggers]
crons = [
  "* * * * *",     # 毎分: 予約投稿の実行
  "0 * * * *",     # 毎時: インサイト収集
  "0 3 * * *",     # 毎日3時: アカウントメトリクス収集
  "0 6 * * 1",     # 毎週月曜6時: トークンリフレッシュ
]

